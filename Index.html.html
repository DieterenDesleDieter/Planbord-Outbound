<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planbord</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #0d1117;
  color: #eee;
  padding: 16px;
  user-select: none;
}

h1 {
  text-align: center;
  font-size: 44px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 14px;
}

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.toolbar button {
  padding: 14px 26px;
  border: none;
  border-radius: 8px;
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
}
.btn-row    { background: #27ae60; color: #fff; }
.btn-export { background: #8e44ad; color: #fff; }
.btn-reset  { background: #c0392b; color: #fff; }

/* ── LEGEND ── */
.legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 19px; color: #ccc; }
.legend-dot  { width: 22px; height: 22px; border-radius: 4px; flex-shrink: 0; }

/* ── TABLE ── */
.board {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  background: #fff;
  border: 3px solid #444;
}
.board th {
  color: #fff;
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 16px 6px;
  border: 2px solid #555;
}
.board td {
  border: 2px solid #bbb;
  padding: 8px 10px;
  vertical-align: top;
  position: relative;
}
.col-afdeling {
  width: 320px;
  background: #f0f0f0;
  vertical-align: middle;
  padding: 8px 10px;
  border-right: 3px solid #888;
}
.th-a      { background: #c0392b; }
.th-b      { background: #2471a3; }
.th-verlof { background: #1e8449; }
.th-ziek   { background: #d35400; }
.th-cursus { background: #6c3483; }

/* ── AFD LABEL ── */
.afd-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.afd-label {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 20px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  flex: 1;
  word-break: break-word;
}
.afd-orange { background: #e67e22; color: #fff; }
.afd-red    { background: #c0392b; color: #fff; }
.afd-blue   { background: #2980b9; color: #fff; }
.afd-plain  { background: transparent; color: #111; font-size: 22px; }

.btn-edit-row, .btn-del-row {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  padding: 4px;
  touch-action: manipulation;
  opacity: 0.6;
  flex-shrink: 0;
}
.btn-edit-row:hover, .btn-del-row:hover { opacity: 1; }

/* ── BADGES ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 5px;
  font-size: 20px;
  font-weight: 700;
  margin: 4px 4px;
  cursor: grab;
  touch-action: none;
  transition: box-shadow 0.15s, opacity 0.15s;
  position: relative;
}
.badge.dragging {
  opacity: 0.4;
  box-shadow: none;
}
.badge-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.88;
  box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  transform: rotate(2deg) scale(1.06);
}

.badge-green  { background: #27ae60; color: #fff; }
.badge-yellow { background: #f1c40f; color: #222; }
.badge-orange { background: #e67e22; color: #fff; }
.badge-black  { background: #222;    color: #fff; }
.badge-teal   { background: #16a085; color: #fff; }
.badge-red    { background: #c0392b; color: #fff; }
.badge-blue   { background: #2980b9; color: #fff; }
.badge-gray   { background: #7f8c8d; color: #fff; }

.badge .badge-del {
  display: none;
  background: rgba(0,0,0,0.3);
  border: none;
  color: #fff;
  border-radius: 50%;
  width: 24px; height: 24px;
  font-size: 16px;
  line-height: 24px;
  text-align: center;
  cursor: pointer;
  padding: 0;
  touch-action: manipulation;
}
.badge:hover .badge-del,
.badge:focus .badge-del { display: inline-block; }

/* Drop zone highlight */
.cell.drag-over {
  background: #dff9fb !important;
  outline: 3px dashed #16a085;
}

/* ── ADD BADGE BUTTON ── */
.btn-add-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 38px; height: 38px;
  border-radius: 50%;
  background: #ecf0f1;
  border: 2px dashed #aaa;
  font-size: 26px;
  color: #888;
  cursor: pointer;
  margin: 4px;
  touch-action: manipulation;
  vertical-align: middle;
}
.btn-add-badge:hover { background: #d5dbdb; color: #333; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #fff;
  color: #222;
  border-radius: 12px;
  padding: 30px 34px;
  min-width: 400px;
  max-width: 92vw;
  box-shadow: 0 12px 48px rgba(0,0,0,0.45);
}
.modal h3 { margin-bottom: 18px; font-size: 26px; }
.modal label { font-size: 17px; font-weight: 700; display: block; margin-bottom: 5px; }
.modal input, .modal select {
  width: 100%; padding: 10px 13px; border: 1.5px solid #ccc;
  border-radius: 6px; font-size: 19px; margin-bottom: 16px;
}
.color-grid {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;
}
.color-swatch {
  width: 44px; height: 44px; border-radius: 6px;
  border: 3px solid transparent;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.1s;
}
.color-swatch.selected { border-color: #111; transform: scale(1.18); }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
.modal-btns button {
  padding: 11px 24px; border: none; border-radius: 6px;
  font-size: 19px; font-weight: 700; cursor: pointer;
  touch-action: manipulation;
}
.btn-confirm { background: #27ae60; color: #fff; }
.btn-cancel  { background: #95a5a6; color: #fff; }
.btn-delete  { background: #e74c3c; color: #fff; }

/* Row modal color swatches */
.row-color-grid {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;
}
</style>
</head>

// ── STATE ──
let dragState = null;   // { rowId, badgeIdx, ghost, offsetX, offsetY }
let badgeCtx  = null;   // { mode:'add'|'edit', rowId, badgeIdx, col }
let rowCtx    = null;   // { mode:'add'|'edit', rowId }
let selBadgeColor = "badge-green";
let selRowColor   = "afd-orange";

// ── BUILD ──
function uid() { return Math.random().toString(36).slice(2,8); }

function buildBoard() {
  const tbody = document.getElementById("board-body");
  tbody.innerHTML = "";
  data.forEach(row => {
    const tr = document.createElement("tr");

    // Afdeling cell
    const tdAfd = document.createElement("td");
    tdAfd.className = "col-afdeling";
    tdAfd.innerHTML = `
      <div class="afd-wrap">
        <span class="afd-label ${row.labelClass}">${row.label}</span>
        <button class="btn-edit-row" title="Rij bewerken" onclick="openRowModal('${row.id}')">✏️</button>
        <button class="btn-del-row"  title="Rij verwijderen" onclick="deleteRow('${row.id}')">🗑️</button>
      </div>`;
    tr.appendChild(tdAfd);

    // 5 data cols
    for (let c = 0; c < 5; c++) {
      const td = document.createElement("td");
      td.className = "cell";
      td.dataset.rowId = row.id;
      td.dataset.col   = c;

      // drop-zone listeners
      td.addEventListener("dragover",  onDragOver);
      td.addEventListener("dragleave", onDragLeave);
      td.addEventListener("drop",      onDrop);
      td.addEventListener("touchmove", onTouchMove, {passive:false});
      td.addEventListener("touchend",  onTouchEnd);

      row.rows.filter(b => b.col === c).forEach((b, _) => {
        const realIdx = row.rows.indexOf(b);
        td.appendChild(makeBadge(row.id, realIdx, b));
      });

      // + button
      const addBtn = document.createElement("button");
      addBtn.className = "btn-add-badge";
      addBtn.textContent = "+";
      addBtn.title = "Naam toevoegen";
      addBtn.onclick = () => openBadgeModal('add', row.id, null, c);
      td.appendChild(addBtn);

      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
}

function makeBadge(rowId, idx, b) {
  const span = document.createElement("span");
  span.className = `badge ${b.color}`;
  span.draggable = true;
  span.dataset.rowId = rowId;
  span.dataset.idx   = idx;

  const nameNode = document.createTextNode(b.name);
  span.appendChild(nameNode);

  const delBtn = document.createElement("button");
  delBtn.className = "badge-del";
  delBtn.textContent = "×";
  delBtn.title = "Verwijder";
  delBtn.onclick = (e) => { e.stopPropagation(); quickDeleteBadge(rowId, idx); };
  span.appendChild(delBtn);

  // Click to edit (only if not dragging)
  span.addEventListener("click", (e) => {
    if (e.target === delBtn) return;
    openBadgeModal('edit', rowId, idx, null);
  });

  // Desktop drag
  span.addEventListener("dragstart", onDragStart);
  span.addEventListener("dragend",   onDragEnd);

  // Touch drag
  span.addEventListener("touchstart", onTouchStart, {passive:false});

  return span;
}

// ── DRAG — DESKTOP ──
function onDragStart(e) {
  const span = e.currentTarget;
  dragState = { rowId: span.dataset.rowId, badgeIdx: parseInt(span.dataset.idx) };
  span.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
}
function onDragEnd(e) {
  e.currentTarget.classList.remove("dragging");
  document.querySelectorAll(".cell.drag-over").forEach(el => el.classList.remove("drag-over"));
  dragState = null;
}
function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add("drag-over");
}
function onDragLeave(e) {
  e.currentTarget.classList.remove("drag-over");
}
function onDrop(e) {
  e.preventDefault();
  const td = e.currentTarget;
  td.classList.remove("drag-over");
  if (!dragState) return;
  moveBadge(dragState.rowId, dragState.badgeIdx, td.dataset.rowId, parseInt(td.dataset.col));
}

// ── DRAG — TOUCH ──
function onTouchStart(e) {
  if (e.touches.length !== 1) return;
  e.preventDefault();
  const span = e.currentTarget;
  const touch = e.touches[0];
  const rect  = span.getBoundingClientRect();

  const ghost = span.cloneNode(true);
  ghost.classList.add("badge-ghost");
  ghost.querySelector(".badge-del") && (ghost.querySelector(".badge-del").style.display = "none");
  ghost.style.width  = rect.width  + "px";
  ghost.style.height = rect.height + "px";
  ghost.style.left   = rect.left   + "px";
  ghost.style.top    = rect.top    + "px";
  document.body.appendChild(ghost);

  dragState = {
    rowId:    span.dataset.rowId,
    badgeIdx: parseInt(span.dataset.idx),
    ghost,
    offsetX:  touch.clientX - rect.left,
    offsetY:  touch.clientY - rect.top,
  };
  span.classList.add("dragging");
}

function onTouchMove(e) {
  if (!dragState || !dragState.ghost) return;
  e.preventDefault();
  const touch = e.touches[0];
  dragState.ghost.style.left = (touch.clientX - dragState.offsetX) + "px";
  dragState.ghost.style.top  = (touch.clientY - dragState.offsetY) + "px";

  // highlight cell under finger
  dragState.ghost.style.display = "none";
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  dragState.ghost.style.display = "";
  document.querySelectorAll(".cell.drag-over").forEach(c => c.classList.remove("drag-over"));
  const cell = el && el.closest(".cell");
  if (cell) cell.classList.add("drag-over");
}

function onTouchEnd(e) {
  if (!dragState) return;
  const touch = e.changedTouches[0];

  if (dragState.ghost) {
    dragState.ghost.remove();
    dragState.ghost = null;
  }
  document.querySelectorAll(".cell.drag-over").forEach(c => c.classList.remove("drag-over"));
  document.querySelectorAll(".badge.dragging").forEach(b => b.classList.remove("dragging"));

  dragState.ghost = null;
  const el   = document.elementFromPoint(touch.clientX, touch.clientY);
  const cell = el && el.closest(".cell");
  if (cell) {
    moveBadge(dragState.rowId, dragState.badgeIdx, cell.dataset.rowId, parseInt(cell.dataset.col));
  }
  dragState = null;
}

function moveBadge(fromRowId, fromIdx, toRowId, toCol) {
  const fromRow = data.find(r => r.id === fromRowId);
  const badge   = fromRow.rows[fromIdx];
  if (!badge) return;
  fromRow.rows.splice(fromIdx, 1);
  const toRow = data.find(r => r.id === toRowId);
  toRow.rows.push({ col: toCol, name: badge.name, color: badge.color });
  buildBoard();
}

// ── BADGE MODAL ──
function openBadgeModal(mode, rowId, idx, col) {
  badgeCtx = { mode, rowId, idx, col };
  const b = (mode === 'edit') ? data.find(r => r.id === rowId).rows[idx] : null;

  document.getElementById("bm-title").textContent = mode === 'edit' ? "Naam bewerken" : "Naam toevoegen";
  document.getElementById("bm-naam").value = b ? b.name : "";
  document.getElementById("bm-del").style.display = mode === 'edit' ? "" : "none";

  selBadgeColor = b ? b.color : "badge-green";
  renderColorGrid("bm-colors", BADGE_COLORS, selBadgeColor, (k) => { selBadgeColor = k; });

  document.getElementById("badge-modal").classList.add("active");
  setTimeout(() => document.getElementById("bm-naam").focus(), 100);
}

function confirmBadge() {
  const naam = document.getElementById("bm-naam").value.trim();
  if (!naam) { alert("Voer een naam in."); return; }
  const row = data.find(r => r.id === badgeCtx.rowId);

  if (badgeCtx.mode === 'edit') {
    row.rows[badgeCtx.idx].name  = naam;
    row.rows[badgeCtx.idx].color = selBadgeColor;
  } else {
    row.rows.push({ col: badgeCtx.col, name: naam, color: selBadgeColor });
  }
  closeModal("badge-modal");
  buildBoard();
}

function confirmDeleteBadge() {
  if (!badgeCtx || badgeCtx.mode !== 'edit') return;
  const row = data.find(r => r.id === badgeCtx.rowId);
  row.rows.splice(badgeCtx.idx, 1);
  closeModal("badge-modal");
  buildBoard();
}

function quickDeleteBadge(rowId, idx) {
  const row = data.find(r => r.id === rowId);
  row.rows.splice(idx, 1);
  buildBoard();
}

// ── ROW MODAL ──
function openRowModal(rowId) {
  rowCtx = { mode: rowId ? 'edit' : 'add', rowId };
  const row = rowId ? data.find(r => r.id === rowId) : null;

  document.getElementById("rm-title").textContent = rowId ? "Rij bewerken" : "Nieuwe rij";
  document.getElementById("rm-naam").value = row ? row.label : "";

  selRowColor = row ? row.labelClass : "afd-orange";
  renderColorGrid("rm-colors", ROW_COLORS, selRowColor, (k) => { selRowColor = k; });

  document.getElementById("row-modal").classList.add("active");
  setTimeout(() => document.getElementById("rm-naam").focus(), 100);
}

function confirmRow() {
  const naam = document.getElementById("rm-naam").value.trim();
  if (!naam) { alert("Voer een naam in."); return; }

  if (rowCtx.mode === 'edit') {
    const row = data.find(r => r.id === rowCtx.rowId);
    row.label      = naam.toUpperCase();
    row.labelClass = selRowColor;
  } else {
    data.push({ id: uid(), label: naam.toUpperCase(), labelClass: selRowColor, rows: [] });
  }
  closeModal("row-modal");
  buildBoard();
}

function deleteRow(rowId) {
  const row = data.find(r => r.id === rowId);
  if (!confirm(`Rij "${row.label}" verwijderen?`)) return;
  data = data.filter(r => r.id !== rowId);
  buildBoard();
}

// ── HELPERS ──
function renderColorGrid(containerId, colors, selectedKey, onChange) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = "";
  colors.forEach(c => {
    const sw = document.createElement("div");
    sw.className = "color-swatch" + (c.key === selectedKey ? " selected" : "");
    sw.style.background = c.hex;
    if (c.key === "afd-plain") { sw.style.background = "#ddd"; sw.title = "Geen kleur"; }
    sw.addEventListener("click", () => {
      grid.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("selected"));
      sw.classList.add("selected");
      onChange(c.key);
    });
    grid.appendChild(sw);
  });
}

function closeModal(id) {
  document.getElementById(id).classList.remove("active");
}

function exportCSV() {
  let csv = "Afdeling,A Ploeg,B Ploeg,Verlof,Ziek,Cursus\n";
  data.forEach(row => {
    const cols = [[],[],[],[],[]];
    row.rows.forEach(b => cols[b.col].push(b.name));
    csv += `"${row.label}","${cols[0].join('; ')}","${cols[1].join('; ')}","${cols[2].join('; ')}","${cols[3].join('; ')}","${cols[4].join('; ')}"\n`;
  });
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "planbord.csv"; a.click();
}

// ── OPSLAG ──
const STORAGE_KEY = "planbord_data_v1";

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { data = JSON.parse(saved); }
  } catch(e) {}
}

function resetData() {
  if (!confirm("Alle wijzigingen wissen en terugkeren naar het originele bord?")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// Auto-save na elke buildBoard
const _origBuildBoard = buildBoard;
buildBoard = function() { _origBuildBoard(); saveData(); };

// close modals on overlay click
document.getElementById("badge-modal").addEventListener("click", e => { if (e.target === e.currentTarget) closeModal("badge-modal"); });
document.getElementById("row-modal").addEventListener("click",   e => { if (e.target === e.currentTarget) closeModal("row-modal"); });

loadData();
buildBoard();
</script>
</body>
</html>
